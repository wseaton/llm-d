apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../../../../recipes/modelserver/base/single-host/default

namePrefix: modelexpress-p2p-nvidia-gpu-vllm-

# Stock llm-d-cuda does NOT ship the ModelExpress client; build the image
# from the README's Image section and point newName/newTag at it.
images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: <your-registry>/llm-d-cuda-modelexpress
    newTag: v0.7.0

labels:
  - pairs:
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/guide: modelexpress-p2p
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true
patches:
  - path: patch-vllm.yaml
