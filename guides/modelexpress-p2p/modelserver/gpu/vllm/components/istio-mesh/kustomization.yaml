apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

# Joins the decode pods to the Istio mesh (mTLS identity for broker calls)
# while EXCLUDING the NIXL metadata + worker gRPC ports from sidecar
# interception: the UCX/NIXL out-of-band wireup breaks if intercepted, and
# the bulk transfer rides IB verbs outside the mesh anyway. Ports are
# base..base+TP-1 (TP=2 here); widen if you change --tensor-parallel-size.
patches:
  - target:
      kind: Deployment
      name: decode
    path: patch-istio.yaml
