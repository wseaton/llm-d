apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# fastsafetensors-off-NFS baseline test (PRIMARY): the storage->HBM
# counterpart the P2P numbers are compared against.
resources:
  - ../../../../../recipes/modelserver/base/single-host/default

# prewarm-job.yaml is deliberately NOT a resource here: listing it would
# namePrefix the PVC per-overlay and force a separate 140GB download per
# test. Apply it standalone so both tests share the literal `fst-model-cache`.
namePrefix: fastsafetensors-nfs-nvidia-gpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/llm-d/llm-d-cuda
    newTag: v0.7.0

labels:
  - pairs:
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/guide: fastsafetensors-nfs
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true
patches:
  - path: patch-vllm.yaml
