apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# fastsafetensors + GPUDirect Storage baseline arm (PRIMARY).
#
# This is the apples-to-apples storage counterpart to the ModelExpress P2P
# arm: a one-shot Job downloads the checkpoint once into an NFS RWX PVC,
# every pod mounts it read-only, and vLLM serves with
# `--load-format fastsafetensors`. The difference vs P2P: this pays a
# storage->HBM hop, P2P pays HBM->HBM. On the CoreWeave cluster this guide
# was validated on, the NFS mount is TCP-only, so the loader runs its
# parallel POSIX-pread path (no GDS); see the README's GDS note.
resources:
  - ../../../../../recipes/modelserver/base/single-host/default

# NOTE: prewarm-job.yaml (the NFS PVC + download Job) is applied
# standalone with `kubectl apply -f`, NOT listed here, so its PVC keeps the
# literal name `fst-model-cache` (un-prefixed) and BOTH fastsafetensors arms
# can mount the same one-time download. Listing it here would namePrefix the
# PVC per-overlay and force a separate 140GB download per arm.
namePrefix: fastsafetensors-nfs-nvidia-gpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/llm-d/llm-d-cuda
    newTag: v0.7.0

labels:
  - pairs:
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/guide: fastsafetensors-nfs
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true
patches:
  - path: patch-vllm.yaml
