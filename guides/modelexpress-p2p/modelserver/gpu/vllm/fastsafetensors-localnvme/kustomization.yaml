apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# fastsafetensors + GDS off warm local NVMe (OPTIONAL test). Beats network
# storage on the GDS hop but loses dedup (every node re-primes) and the GDS
# path is fragile; prefer the NFS test unless you want a local-NVMe number.
# Requires the `fst-model-cache` PVC from prewarm-job.yaml (applied
# standalone, as in the NFS test).
resources:
  - ../../../../../recipes/modelserver/base/single-host/default

namePrefix: fastsafetensors-localnvme-nvidia-gpu-vllm-

images:
  - name: REPLACE_MODEL_SERVER_IMAGE
    newName: ghcr.io/llm-d/llm-d-cuda
    newTag: v0.7.0

labels:
  - pairs:
      llm-d.ai/model: Llama-3.3-70B-Instruct
      llm-d.ai/guide: fastsafetensors-localnvme
      llm-d.ai/accelerator-variant: gpu
      llm-d.ai/accelerator-vendor: nvidia
    includeSelectors: true
    includeTemplates: true
    fields:
      - version: v1
        kind: ServiceAccount
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: metadata/labels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/selector/matchLabels
        create: true
      - group: apps
        version: v1
        kind: Deployment
        path: spec/template/metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: metadata/labels
        create: true
      - group: monitoring.coreos.com
        version: v1
        kind: PodMonitor
        path: spec/selector/matchLabels
        create: true
patches:
  - path: patch-vllm.yaml
