# ModelExpress metadata broker, kubernetes backend (state lives in the MX
# CRDs, so no Redis and no server-side storage).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: modelexpress
  labels:
    app.kubernetes.io/name: modelexpress
    llm-d.ai/guide: modelexpress-p2p
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: modelexpress-metadata
  labels:
    app.kubernetes.io/name: modelexpress
    llm-d.ai/guide: modelexpress-p2p
rules:
  - apiGroups: [modelexpress.nvidia.com]
    resources: [modelmetadatas, modelcacheentries]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [modelexpress.nvidia.com]
    resources: [modelmetadatas/status, modelcacheentries/status]
    verbs: [get, update, patch]
  # ConfigMaps host tensor descriptors in the kubernetes backend.
  # In shared namespaces, install this guide in a dedicated namespace.
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: modelexpress-metadata
  labels:
    app.kubernetes.io/name: modelexpress
    llm-d.ai/guide: modelexpress-p2p
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: modelexpress-metadata
subjects:
  - kind: ServiceAccount
    name: modelexpress
---
apiVersion: v1
kind: Service
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
    llm-d.ai/guide: modelexpress-p2p
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: grpc
  selector:
    app: modelexpress-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modelexpress-server
  labels:
    app: modelexpress-server
    llm-d.ai/guide: modelexpress-p2p
spec:
  replicas: 1
  selector:
    matchLabels:
      app: modelexpress-server
  template:
    metadata:
      labels:
        app: modelexpress-server
        llm-d.ai/guide: modelexpress-p2p
    spec:
      serviceAccountName: modelexpress
      containers:
        - name: modelexpress-server
          image: nvcr.io/nvidia/ai-dynamo/modelexpress-server:0.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
              name: grpc
          env:
            - name: MX_METADATA_BACKEND
              value: "kubernetes"
            - name: MX_METADATA_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: MODEL_EXPRESS_SERVER_PORT
              value: "8001"
            - name: MODEL_EXPRESS_LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 8Gi
          # grpc, not tcpSocket: with a sidecar injected, tcpSocket only tests
          # the sidecar (Istio rewrites httpGet/grpc probes, not tcpSocket).
          livenessProbe:
            grpc:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            grpc:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
      imagePullSecrets:
        - name: nvcr-imagepullsecret
